<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Без шуток — Геополитика</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ff4757;
            --card-bg: #1e1e1e;
            --menu-bg: #2c2c2c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; z-index: 10; }
        .logo { font-size: 24px; font-weight: 700; letter-spacing: 1px; }
        
        /* Бургер */
        .burger { cursor: pointer; width: 30px; height: 21px; position: relative; -webkit-tap-highlight-color: transparent; outline: none; }
        .burger span { position: absolute; width: 100%; height: 3px; background-color: var(--text-color); border-radius: 2px; transition: all 0.3s ease; }
        .burger span:nth-child(1) { top: 0; }
        .burger span:nth-child(2) { top: 9px; }
        .burger span:nth-child(3) { top: 18px; }
        .burger.active span:nth-child(1) { transform: rotate(45deg); top: 9px; }
        .burger.active span:nth-child(2) { opacity: 0; }
        .burger.active span:nth-child(3) { transform: rotate(-45deg); top: 9px; }

        /* Меню */
        .mobile-menu { position: fixed; top: 0; left: -100%; width: 70%; height: 100vh; background-color: var(--menu-bg); padding: 60px 20px; transition: left 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index: 20; display: flex; flex-direction: column; gap: 20px; }
        .mobile-menu.open { left: 0; }
        .nav-link { color: var(--text-color); text-decoration: none; font-size: 18px; padding: 10px 0; border-bottom: 1px solid #333; cursor: pointer; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
        .nav-link:hover { color: var(--accent-color); }

        main { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }

        /* Карточка */
        .news-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
        }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-media { width: 100%; height: 200px; border-radius: 8px; margin-bottom: 15px; object-fit: cover; background-color: #333; }
        
        .video-overlay { position: relative; width: 100%; height: 200px; border-radius: 8px; margin-bottom: 15px; overflow: hidden; }
        .video-overlay video { width: 100%; height: 100%; object-fit: cover; }
        .video-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 48px; }

        .category-tag { font-size: 12px; color: var(--accent-color); font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .card-title { font-size: 20px; margin-bottom: 15px; line-height: 1.3; }
        .card-meta { margin-top: auto; display: flex; justify-content: space-between; font-size: 14px; color: #aaa; align-items: flex-end; }
        .author { font-weight: bold; color: var(--text-color); }

        .full-content { display: none; margin-top: 15px; font-size: 16px; line-height: 1.6; color: #ddd; }
        .expanded .full-content { display: block; }
        .expanded .card-summary { display: none; }

        footer { text-align: center; padding: 40px 20px; border-top: 1px solid #333; margin-top: auto; }
        .copyright { font-size: 18px; font-weight: bold; color: var(--text-color); }
    </style>
</head>
<body>

    <header>
        <div class="logo">Без шуток</div>
        <div class="burger" id="burger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <nav class="mobile-menu" id="mobileMenu">
        <a href="index.html" class="nav-link">Все</a>
        <a href="politics.html" class="nav-link">Политика</a>
        <a href="geopolitics.html" class="nav-link">Геополитика</a>
        <a href="absurd.html" class="nav-link">Абсурдные законы</a>
        <a href="regions.html" class="nav-link">Регионы</a>
    </nav>

    <main>
        <div class="news-grid" id="newsContainer"></div>
    </main>

    <footer>
        <p class="copyright">2026 © «Без шуток»</p>
    </footer>

    <script>
        // В ЭТОМ ФАЙЛЕ ТОЛЬКО НОВОСТИ КАТЕГОРИИ "Геополитика"
        // Новую новость всегда добавляй В САМОЕ НАЧАЛО массива
        const newsData = [
            {
                title: "Конфликт на границе",
                category: "geopolitics",
                author: "САРМАТ",
                date: new Date(),
                image: "https://via.placeholder.com/300x200/6a6a6a/fff?text=Border",
                content: "Ситуация на границе остается напряженной. Дипломатические усилия направлены на снижение эскалации и поиск мирного решения конфликта."
            },
            {
                title: "Переговоры по безопасности",
                category: "geopolitics",
                author: "САРМАТ",
                date: new Date(Date.now() - 86400000),
                image: "https://via.placeholder.com/300x200/7a7a7a/fff?text=Negotiations",
                content: "Лидеры двух государств провели экстренные переговоры. Обсуждались вопросы безопасности, торговли и гуманитарного сотрудничества. Стороны договорились о создании рабочей группы для дальнейшей проработки деталей."
            },
            {
                title: "Новый альянс в регионе",
                category: "geopolitics",
                author: "САРМАТ",
                date: new Date(Date.now() - (86400000 * 2)),
                image: "https://via.placeholder.com/300x200/8a8a8a/fff?text=Alliance",
                content: "В регионе формируется новый политический альянс. Эксперты считают, что это может изменить баланс сил в ближайшие годы. Подписание меморандума ожидается в течение месяца."
            }
        ];

        function formatDate(dateObj) {
            return dateObj.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function renderNews() {
            const container = document.getElementById('newsContainer');
            container.innerHTML = '';
            
            newsData.forEach((item, index) => {
                // Уникальный ключ для этой страницы, чтобы состояние не конфликтовало с другими категориями
                const isExpanded = JSON.parse(localStorage.getItem(`news_geopolitics_${index}`)) === true;

                let mediaBlock = '';
                if (item.isVideo) {
                    mediaBlock = `
                        <div class="video-overlay">
                            <div class="video-placeholder">▶</div>
                            <video src="${item.videoPlaceholder}" muted loop playsinline></video>
                        </div>
                    `;
                } else {
                    mediaBlock = `<img src="${item.image}" alt="${item.title}" class="card-media">`;
                }

                const card = document.createElement('article');
                card.className = `news-card${isExpanded ? ' expanded' : ''}`;
                
                card.innerHTML = `
                    ${mediaBlock}
                    <span class="category-tag">${item.category}</span>
                    <h3 class="card-title">${item.title}</h3>
                    <div class="card-meta">
                        <span class="author">${item.author}</span>
                        <span>${formatDate(item.date)}</span>
                    </div>
                    <div class="card-summary" ${isExpanded ? 'style="display:none;"' : ''}>
                        <p style="color: #aaa; font-size: 14px;">Нажмите, чтобы прочитать полную новость</p>
                    </div>
                    <div class="full-content" ${!isExpanded ? 'style="display:none;"' : ''}>
                        ${item.content.replace(/\n/g, '<br>')}
                    </div>
                `;

                card.addEventListener('click', () => {
                    card.classList.toggle('expanded');
                    const currentState = card.classList.contains('expanded');
                    localStorage.setItem(`news_geopolitics_${index}`, currentState);
                });

                container.appendChild(card);
            });
        }

        // Логика мобильного меню
        const burger = document.getElementById('burger');
        const mobileMenu = document.getElementById('mobileMenu');

        burger.addEventListener('click', () => {
            burger.classList.toggle('active');
            mobileMenu.classList.toggle('open');
        });

        renderNews();
    </script>
</body>
</html>
