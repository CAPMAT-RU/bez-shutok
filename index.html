<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Без шуток | Новости с иронией</title>
<style>
:root { --bg-color: #f0f2f5; --card-bg: #ffffff; --text-main: #111; --accent: #d32f2f; --border: #ddd; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; }
a { text-decoration: none; color: inherit; }
header { background: var(--card-bg); padding: 1rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
.logo { font-size: 1.2rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }
nav ul { display: flex; gap: 15px; flex-wrap: wrap; }
nav a { font-weight: 500; font-size: 0.9rem; }
nav a:hover { color: var(--accent); }
.hero { text-align: center; padding: 2rem 1rem; max-width: 800px; margin: 0 auto; }
.hero h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
.container { max-width: 1200px; margin: 1rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr; gap: 1rem; }
.card { background: var(--card-bg); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.03); }
.card-image { width: 100%; height: 200px; object-fit: cover; }
.card-body { padding: 1rem; }
.category { font-size: 0.7rem; text-transform: uppercase; color: var(--accent); font-weight: bold; margin-bottom: 0.5rem; display: block; }
.card-title { font-size: 1.1rem; margin-bottom: 0.5rem; line-height: 1.4; }
.card-meta { color: #777; font-size: 0.8rem; margin-top: 0.5rem; }
footer { text-align: center; padding: 1rem; color: #777; border-top: 1px solid var(--border); margin-top: 2rem; }
</style>
</head>
<body>
<header>
<div class="logo">БЕЗ ШУТОК</div>
<nav>
<ul>
<li><a href="#">Главная</a></li>
<li><a href="#">Политика</a></li>
<li><a href="#">Мемы</a></li>
</ul>
</nav>
</header>
<section class="hero">
<h1>Новости, которые бьют прямо в лоб</h1>
<p>Никакой воды. Только факты, приправленные абсурдом.</p>
</section>
<main class="container" id="news-container">
<p>Загрузка новостей...</p>
</main>
<footer><p>&copy; 2026 ©Без шуток</p></footer>

<script>
const newsData = [
  {
    "id": 1,
    "category": "Технологии",
    "title": "Робот-курьер застрял в луже и начал цитировать философов",
    "author": "Иван Иванов",
    "date": "Сегодня, 10:00",
    "image": "https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
    "video": null
  },
  {
    "id": 2,
    "category": "Экономика",
    "title": "Курс валют такой волатильный, что даже хомяк в колесе устал его предсказывать",
    "author": "Петр Петров",
    "date": "Вчера, 18:30",
    "image": null,
    "video": null
  }
];

const container = document.getElementById('news-container');
let html = '';

newsData.forEach(news => {
  let imgHtml = '';
  if (news.image) {
    imgHtml = `<img src="${news.image}" class="card-image" alt="News image">`;
  }
  
  html += `
    <div class="card">
      ${imgHtml}
      <div class="card-body">
        <span class="category">${news.category}</span>
        <h3 class="card-title">${news.title}</h3>
        <div class="card-meta">
          <span>${news.author}</span>
          <span>${news.date}</span>
        </div>
      </div>
    </div>
  `;
});

container.innerHTML = html;
</script>
</body>
</html>
