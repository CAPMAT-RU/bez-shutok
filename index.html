
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Без шуток — Все новости</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ff4757;
            --card-bg: #1e1e1e;
            --menu-bg: #2c2c2c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background-color: var(--bg-color); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1000; border-bottom: 1px solid #333; }
        .header-left, .header-right { display: flex; align-items: center; gap: 20px; }
        .site-logo-img { height: 35px; width: auto; }
        .logo { font-size: 24px; font-weight: 700; letter-spacing: 1px; color: var(--accent-color); }
        #siteSearch { background: #222; border: 1px solid #444; color: #fff; padding: 6px 15px; border-radius: 20px; outline: none; font-size: 14px; transition: border-color 0.3s; width: 180px; }
        #siteSearch:focus { border-color: var(--accent-color); }
        
        .burger { cursor: pointer; width: 30px; height: 21px; position: relative; }
        .burger span { position: absolute; width: 100%; height: 3px; background-color: var(--text-color); border-radius: 2px; transition: all 0.3s ease; }
        .burger span:nth-child(1) { top: 0; }
        .burger span:nth-child(2) { top: 9px; }
        .burger span:nth-child(3) { top: 18px; }
        .burger.active span:nth-child(1) { transform: rotate(45deg); top: 9px; }
        .burger.active span:nth-child(2) { opacity: 0; }
        .burger.active span:nth-child(3) { transform: rotate(-45deg); top: 9px; }

        .mobile-menu { position: fixed; top: 0; left: -100%; width: 70%; height: 100vh; background-color: var(--menu-bg); padding: 40px 20px; transition: left 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index:1100; display: flex; flex-direction: column; gap: 15px; }
        .mobile-menu.open { left: 0; }
        .nav-link { color: var(--text-color); text-decoration: none; font-size: 18px; padding: 12px 0; border-bottom: 1px solid #444; cursor: pointer; user-select: none; transition: color 0.2s; }
        .nav-link:hover { color: var(--accent-color); }

        main { margin-top: 60px; padding: 40px; max-width: 1200px; margin-left: auto; margin-right: auto; width: 100%; flex:1; }
        h2.section-title { margin-bottom: 20px; border-left: 5px solid var(--accent-color); padding-left: 15px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-bottom:50px; }
        .news-card { background-color: var(--card-bg); padding: 20px; border-radius: 12px; transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; cursor: pointer; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255, 71,87, 0.5); }
        .card-media { width: 100%; border-radius:8px; margin-bottom: 15px; object-fit: cover; }
        .category-tag { color: var(--accent-color); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .card-title { font-size: 20px; margin-bottom: 15px; line-height: 1.3; }
        .author { font-weight: bold; color: var(--text-color); }
        .publish-date { color: #888; margin-right: 10px; }
        .publish-time { color: #888; }
        .card-meta { margin-top: auto; font-size: 14px; }
        .full-content { display: none; margin-top: 15px; font-size: 16px; line-height: 1.6; color: #ddd; }
        .expanded .full-content { display: block; }
        .expanded .card-summary { display: none; }
        footer { padding: 40px 20px; border-top: 1px solid #333; margin-top: auto; text-align: center; }
        .copyright { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="https://via.placeholder.com/40/ff4757/000000?text=LOGO" class="site-logo-img" alt="Logo">
            <div class="logo">Без шуток</div>
        </div>
        <div class="header-right">
            <input type="text" id="siteSearch" placeholder="Поиск по сайту...">
            <div class="burger" id="burger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <nav class="mobile-menu" id="mobileMenu">
        <a href="#all" class="nav-link">Все новости</a>
        <a href="#politics" class="nav-link">Политика</a>
        <a href="#regions" class="nav-link">Регионы</a>
        <a href="#absurd" class="nav-link">Абсурд</a>
        <a href="#crime" class="nav-link">Криминал</a>
        <a href="#geopolitics" class="nav-link">Геополитика</a>
        <a href="#sport" class="nav-link">Спорт</a>
    </nav>

    <main>
        <div id="all"><h2 class="section-title">Все новости подряд</h2><div class="news-grid" id="grid-all"></div></div>
        <div id="politics"><h2 class="section-title">Политика</h2><div class="news-grid" id="grid-politics"></div></div>
        <div id="regions"><h2 class="section-title">Регионы</h2><div class="news-grid" id="grid-regions"></div></div> 
        <div id="absurd"><h2 class="section-title">Абсурдные новости</h2><div class="news-grid" id="grid-absurd"></div></div> 
        <div id="crime"><h2 class="section-title">Криминал</h2><div class="news-grid" id="grid-crime"></div></div>
        <div id="geopolitics"><h2 class="section-title">Геополитика</h2><div class="news-grid" id="grid-geopolitics"></div></div>
        <div id="sport"><h2 class="section-title">Спорт</h2><div class="news-grid" id="grid-sport"></div></div>
    </main>

    <footer>
        <p class="copyright">2026 © «Без шуток»</p>
    </footer>

    <script>
        async function loadNews() {
            try {
                const response = await fetch('news.json');
                if (!response.ok) throw new Error('Файл не найден');
                const data = await response.json();
                renderGrids(data);
            } catch (error) {
                console.error(error);
                document.getElementById('grid-all').innerHTML = '<p style="color:red; text-align:center;">Ошибка! Проверь, лежит ли файл news.json рядом с index.html и запущен ли сервер (Live Server).</p>';
            }
        }

        function createCardHTML(item) {
            return `
                <article class="news-card">
                    <img src="${item.image || 'https://via.placeholder.com/300x200/333/fff?text=No+Image'}" 
                         alt="${item.title}" class="card-media">
                    <span class="category-tag">${item.category}</span>
                    <h3 class="card-title">${item.title}</h3>
                    <div class="card-meta">
                        <span class="author">${item.author}</span>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="publish-date">${item.date || ''}</span>
                            <span class="publish-time">${item.time || ''}</span>
                        </div>
                    </div>
                    <div class="card-summary"><p style="color: #aaa; font-size: 14px; margin-top:10px;">Нажмите, чтобы прочитать</p></div>
                    <div class="full-content">${item.content ? item.content.replace(/\n/g, '<br>') : 'Нет текста'}</div>
                </article>
            `;
        }

        function renderGrids(newsData) {
            const grids = {
                all: document.getElementById('grid-all'),
                politics: document.getElementById('grid-politics'),
                regions: document.getElementById('grid-regions'),
                absurd: document.getElementById('grid-absurd'),
                crime: document.getElementById('grid-crime'),
                geopolitics: document.getElementById('grid-geopolitics'),
                sport: document.getElementById('grid-sport')
            };

            Object.values(grids).forEach(g => g.innerHTML = '');

            newsData.forEach(item => {
                const html = createCardHTML(item);
                grids.all.insertAdjacentHTML('beforeend', html);

                const cat = item.category;
                if (cat === "Политика") grids.politics.insertAdjacentHTML('beforeend', html);
                if (cat === "Регионы") grids.regions.insertAdjacentHTML('beforeend', html);
                if (cat === "Абсурд") grids.absurd.insertAdjacentHTML('beforeend', html);
                if (cat === "Криминал") grids.crime.insertAdjacentHTML('beforeend', html);
                if (cat === "Геополитика") grids.geopolitics.insertAdjacentHTML('beforeend', html);
                if (cat === "Спорт") grids.sport.insertAdjacentHTML('beforeend', html);
            });
            
            attachHandlers();
        }

        function attachHandlers() {
            document.querySelectorAll('.news-card').forEach(card => {
                card.addEventListener('click', () => {
                    card.classList.toggle('expanded');
                });
            });

            const burger = document.getElementById('burger');
            const menu = document.getElementById('mobileMenu');
            burger.addEventListener('click', () => {
                burger.classList.toggle('active');
                menu.classList.toggle('open');
            });
        }

        loadNews();
    </script>
</body>
</html>
